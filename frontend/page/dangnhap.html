<!DOCTYPE html>

<html class="light" lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Đăng nhập | MedCheck Clinic</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Manrope:wght@600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=inter:wght@100..900&amp;family=manrope:wght@100..900&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-container": "#566167",
              "secondary-fixed": "#c6e7ff",
              "primary-fixed": "#d6e3ff",
              "on-tertiary-fixed-variant": "#3e484e",
              "inverse-on-surface": "#ecf0ff",
              "surface-container-lowest": "#ffffff",
              "error-container": "#ffdad6",
              "inverse-surface": "#20314b",
              "on-primary-fixed": "#001b3d",
              "primary-fixed-dim": "#a9c7ff",
              "surface-container-low": "#f0f3ff",
              "on-background": "#091c35",
              "surface-container-high": "#dfe8ff",
              error: "#ba1a1a",
              "on-tertiary": "#ffffff",
              secondary: "#00658d",
              "on-secondary-fixed": "#001e2d",
              tertiary: "#3f494f",
              "on-secondary": "#ffffff",
              "on-primary": "#ffffff",
              "surface-bright": "#f9f9ff",
              primary: "#00478d",
              "on-primary-fixed-variant": "#00468c",
              "on-tertiary-fixed": "#131d22",
              "surface-tint": "#005db6",
              "tertiary-fixed": "#d9e4eb",
              "surface-container-highest": "#d6e3ff",
              "secondary-container": "#41befd",
              "on-primary-container": "#c8daff",
              background: "#f9f9ff",
              "inverse-primary": "#a9c7ff",
              "on-surface": "#091c35",
              "on-error": "#ffffff",
              "on-surface-variant": "#424752",
              outline: "#727783",
              "on-secondary-container": "#004b69",
              "surface-dim": "#cadbfc",
              "on-error-container": "#93000a",
              "outline-variant": "#c2c6d4",
              "on-tertiary-container": "#d1dce3",
              "surface-variant": "#d6e3ff",
              "tertiary-fixed-dim": "#bdc8cf",
              "on-secondary-fixed-variant": "#004c6b",
              "secondary-fixed-dim": "#81cfff",
              surface: "#f9f9ff",
              "surface-container": "#e7eeff",
              "primary-container": "#005eb8",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {
              md: "16px",
              "container-max": "1440px",
              base: "4px",
              gutter: "24px",
              xs: "4px",
              sm: "8px",
              lg: "24px",
              xl: "48px",
            },
            fontFamily: {
              "headline-md": ["manrope"],
              "label-md": ["inter"],
              "headline-lg-mobile": ["manrope"],
              "display-lg": ["manrope"],
              "code-sm": ["jetbrainsMono"],
              "body-lg": ["inter"],
              "body-md": ["inter"],
              "title-lg": ["inter"],
              "headline-lg": ["manrope"],
            },
            fontSize: {
              "headline-md": [
                "24px",
                { lineHeight: "32px", fontWeight: "600" },
              ],
              "label-md": [
                "12px",
                {
                  lineHeight: "16px",
                  letterSpacing: "0.05em",
                  fontWeight: "600",
                },
              ],
              "headline-lg-mobile": [
                "24px",
                { lineHeight: "32px", fontWeight: "600" },
              ],
              "display-lg": [
                "48px",
                {
                  lineHeight: "56px",
                  letterSpacing: "-0.02em",
                  fontWeight: "700",
                },
              ],
              "code-sm": ["12px", { lineHeight: "16px", fontWeight: "400" }],
              "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "title-lg": ["20px", { lineHeight: "28px", fontWeight: "600" }],
              "headline-lg": [
                "32px",
                { lineHeight: "40px", fontWeight: "600" },
              ],
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden"
  >
    <!-- Background Decorative Element (Subtle Medical Gradient) -->
    <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
      <div
        class="absolute top-[-10%] right-[-5%] w-[500px] h-[500px] bg-secondary-container opacity-10 rounded-full blur-[100px]"
      ></div>
      <div
        class="absolute bottom-[-10%] left-[-5%] w-[600px] h-[600px] bg-primary-fixed opacity-10 rounded-full blur-[120px]"
      ></div>
    </div>
    <!-- Main Login Container -->
    <main class="relative z-10 w-full max-w-[440px] px-md">
      <!-- Logo & Branding -->
      <div class="flex flex-col items-center mb-lg">
        <div
          class="w-16 h-16 bg-primary rounded-full flex items-center justify-center mb-md shadow-sm border border-outline-variant"
        >
          <span
            class="material-symbols-outlined text-white text-[32px]"
            data-icon="medical_services"
            >medical_services</span
          >
        </div>
        <h1
          class="font-headline-md text-headline-md text-primary tracking-tight"
        >
          MedCheck Clinic
        </h1>
        <p class="font-body-md text-on-surface-variant mt-xs">
          Hệ thống tra cứu tương tác thuốc
        </p>
      </div>
      <!-- Login Form Card -->
      <div
        class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg shadow-sm"
      >
        <h2 class="font-title-lg text-title-lg text-on-surface mb-lg">
          Đăng nhập hệ thống
        </h2>
        <form class="space-y-md" id="loginForm">
          <!-- Username Field -->
          <div>
            <label
              class="block font-label-md text-label-md text-on-surface-variant uppercase mb-xs px-xs"
              for="username"
              >Tên đăng nhập</label
            >
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]"
                data-icon="person"
                >person</span
              >
              <input
                class="w-full pl-xl pr-md py-md bg-white border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none font-body-md"
                id="username"
                name="username"
                placeholder="Nhập mã nhân viên hoặc email"
                required=""
                type="text"
              />
            </div>
          </div>
          <!-- Password Field -->
          <div>
            <div class="flex justify-between items-center mb-xs px-xs">
              <label
                class="block font-label-md text-label-md text-on-surface-variant uppercase"
                for="password"
                >Mật khẩu</label
              >
              <a
                class="text-label-md font-label-md text-primary hover:underline transition-all"
                href="#"
                >Quên mật khẩu?</a
              >
            </div>
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]"
                data-icon="lock"
                >lock</span
              >
              <input
                class="w-full pl-xl pr-xl py-md bg-white border border-outline-variant rounded-lg focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none font-body-md"
                id="password"
                name="password"
                placeholder="••••••••"
                required=""
                type="password"
              />
              <button
                class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors"
                onclick="togglePassword()"
                type="button"
              >
                <span
                  class="material-symbols-outlined text-[20px]"
                  data-icon="visibility"
                  id="passwordIcon"
                  >visibility</span
                >
              </button>
            </div>
          </div>
          <!-- Remember Me (Optional Contextual UI) -->
          <div class="flex items-center px-xs">
            <input
              class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary"
              id="remember"
              type="checkbox"
            />
            <label
              class="ml-sm font-body-md text-on-surface-variant cursor-pointer"
              for="remember"
              >Ghi nhớ đăng nhập</label
            >
          </div>
          <!-- Submit Button -->
          <button
            class="w-full bg-primary text-white font-title-lg py-md rounded-lg hover:bg-on-primary-fixed-variant active:opacity-90 transition-all shadow-sm flex items-center justify-center gap-sm mt-lg"
            type="submit"
          >
            <span>Đăng nhập</span>
            <span class="material-symbols-outlined" data-icon="login"
              >login</span
            >
          </button>
        </form>
        <!-- Registration Footer -->
        <div class="mt-lg pt-lg border-t border-outline-variant text-center">
          <p class="font-body-md text-on-surface-variant">Chưa có tài khoản?</p>
          <a
            class="inline-block mt-xs font-title-lg text-primary hover:text-on-primary-fixed-variant transition-colors"
            href="dangky.html"
            >Đăng ký tài khoản mới</a
          >
        </div>
      </div>
      <!-- Trust Badges / Info -->
      <div class="mt-xl flex flex-col items-center opacity-60">
        <div class="flex items-center gap-md mb-sm">
          <div class="flex items-center gap-xs">
            <span
              class="material-symbols-outlined text-[16px]"
              data-icon="verified_user"
              >verified_user</span
            >
            <span class="text-label-md font-label-md">Bảo mật ISO 27001</span>
          </div>
          <div class="h-1 w-1 bg-outline-variant rounded-full"></div>
          <div class="flex items-center gap-xs">
            <span
              class="material-symbols-outlined text-[16px]"
              data-icon="encrypted"
              >encrypted</span
            >
            <span class="text-label-md font-label-md">Mã hóa đầu cuối</span>
          </div>
        </div>
        <p class="text-label-md font-label-md text-on-surface-variant">
          © 2024 MedCheck Clinic. All rights reserved.
        </p>
      </div>
    </main>
    <!-- Simple Feedback Toast (Hidden by default) -->
    <div
      class="fixed bottom-lg left-1/2 -translate-x-1/2 transform scale-90 opacity-0 bg-inverse-surface text-inverse-on-surface px-lg py-md rounded-full shadow-lg transition-all duration-300 flex items-center gap-sm z-50"
      id="toast"
    >
      <span class="material-symbols-outlined" data-icon="info" id="toastIcon"
        >info</span
      >
      <span class="font-body-md" id="toastMessage">Đang xử lý...</span>
    </div>
    <script src="../js/dangnhap.js"></script>
  </body>
</html>
